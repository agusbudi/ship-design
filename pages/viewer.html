<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Document Viewer — ShipDesign</title>
<link rel="stylesheet" href="../css/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
.vapp{display:flex;flex-direction:column;height:100vh;background:var(--bg-tertiary)}

/* ── topbar ── */
.vtop{height:52px;background:var(--bg-primary);border-bottom:.5px solid var(--border-light);
  display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0;position:relative;z-index:100}
.vback{background:none;border:.5px solid var(--border-mid);border-radius:var(--radius-md);
  padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text-primary);font-family:var(--font)}
.vback:hover{background:var(--bg-secondary)}
.vdoc-name{font-size:15px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vtb{display:flex;gap:6px;align-items:center}
.vtbtn{background:none;border:.5px solid var(--border-mid);border-radius:var(--radius-md);
  padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text-secondary);font-family:var(--font);
  display:flex;align-items:center;gap:5px;white-space:nowrap}
.vtbtn:hover{background:var(--bg-secondary);color:var(--text-primary)}
.vtbtn.on{background:#185FA5;color:#fff;border-color:#185FA5}
.vsep{width:1px;height:22px;background:var(--border-light);flex-shrink:0}

/* ── main split ── */
.vmain{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── canvas area ── */
.vscroll{flex:1;overflow:auto;background:#d8d5d0;display:flex;flex-direction:column;align-items:center;padding:24px;gap:16px;position:relative}

/* ── draw toolbar (image mode) ── */
.draw-toolbar{
  position:sticky;top:0;z-index:50;
  background:var(--bg-primary);border:.5px solid var(--border-mid);
  border-radius:var(--radius-lg);padding:7px 12px;
  display:none;align-items:center;gap:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
  align-self:flex-start;margin-bottom:0;
  flex-wrap:wrap;
}
.draw-toolbar.show{display:flex}
.dt-label{font-size:11px;color:var(--text-tertiary);white-space:nowrap}
.dt-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .1s}
.dt-swatch:hover{transform:scale(1.15)}
.dt-swatch.sel{border-color:var(--text-primary)}
.dt-sep{width:1px;height:20px;background:var(--border-light)}
.dt-slider{width:80px;accent-color:#185FA5}
.dt-btn{width:30px;height:30px;border-radius:var(--radius-md);border:.5px solid var(--border-mid);
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;
  font-family:var(--font);color:var(--text-secondary)}
.dt-btn:hover{background:var(--bg-secondary);color:var(--text-primary)}
.sz-preview{width:40px;height:6px;display:flex;align-items:center;justify-content:center}

/* ── image wrapper ── */
.img-wrap{
  position:relative;
  display:inline-block;
  box-shadow:0 2px 20px rgba(0,0,0,.2);
  /* cursor set by JS depending on mode */
}
/* base image layer */
#base-canvas{display:block;position:absolute;top:0;left:0;pointer-events:none}
/* draw layer — on top when draw mode, behind when annotate mode */
#draw-canvas{display:block;position:absolute;top:0;left:0}
/* pin layer — always on top */
.pin-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pin-layer.active{pointer-events:auto} /* only when annotate mode */

/* ── annotation pin ── */
.ann-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:10;transition:filter .1s}
.ann-pin:hover{filter:brightness(1.15)}

/* ── annotation form (click-to-add) ── */
.ann-form{
  position:absolute;z-index:20;
  background:var(--bg-primary);border:.5px solid var(--border-mid);
  border-radius:var(--radius-lg);padding:13px;width:220px;
  box-shadow:0 4px 16px rgba(0,0,0,.18)
}
.ann-form textarea{
  width:100%;font-size:12px;padding:6px 8px;border-radius:var(--radius-md);
  border:.5px solid var(--border-mid);background:var(--bg-primary);color:var(--text-primary);
  font-family:var(--font);resize:none;min-height:60px;line-height:1.5;display:block
}
.ann-form textarea:focus{outline:none;border-color:#185FA5}
.ann-form-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:8px}

/* ── pin tooltip ── */
.ann-tip{
  position:absolute;z-index:30;
  background:var(--bg-primary);border:.5px solid var(--border-mid);
  border-radius:var(--radius-lg);padding:10px 12px;width:230px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  transform:translate(-12px, calc(-100% - 8px))
}

/* ── PDF page ── */
.pdf-page{
  position:relative;
  box-shadow:0 2px 16px rgba(0,0,0,.2);
  background:#fff;
  display:inline-block;
}
.pdf-page canvas{display:block}
.pdf-page .pin-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pdf-page .pin-layer.active{pointer-events:auto}

/* ── right panel ── */
.vpanel{width:320px;flex-shrink:0;background:var(--bg-primary);border-left:.5px solid var(--border-light);
  display:flex;flex-direction:column;overflow:hidden}
.vph{padding:14px 16px 10px;border-bottom:.5px solid var(--border-light);flex-shrink:0}
.vph-title{font-size:15px;font-weight:500;margin-bottom:10px}
.vfrow{display:flex;gap:6px}
.vfbtn{font-size:12px;padding:4px 10px;border-radius:8px;border:.5px solid var(--border-mid);
  background:none;cursor:pointer;color:var(--text-secondary);font-family:var(--font)}
.vfbtn.on{background:var(--bg-secondary);color:var(--text-primary);font-weight:500}
.vpbody{flex:1;overflow-y:auto;padding:10px 14px}

/* ── comment thread ── */
.cthread{border:.5px solid var(--border-light);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.cthread.resolved{opacity:.6}
.ct-head{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 8px;cursor:pointer}
.ct-head:hover{background:var(--bg-secondary)}
.ct-meta{flex:1;min-width:0}
.ct-author{font-size:13px;font-weight:500}
.ct-time{font-size:11px;color:var(--text-tertiary)}
.ct-prev{font-size:12px;color:var(--text-secondary);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.ct-pg{font-size:10px;padding:1px 6px;border-radius:6px;background:var(--blue-50);color:var(--blue-800)}
.ct-open{font-size:10px;padding:1px 6px;border-radius:6px;background:#FAEEDA;color:#633806;font-weight:500}
.ct-closed{font-size:10px;padding:1px 6px;border-radius:6px;background:#EAF3DE;color:#3B6D11;font-weight:500}
.ct-rc{font-size:10px;color:var(--text-tertiary);margin-left:auto;flex-shrink:0}

.ct-body{display:none;border-top:.5px solid var(--border-light)}
.ct-body.open{display:block}
.creply{padding:8px 12px;border-bottom:.5px solid var(--border-light);display:flex;gap:8px}
.creply:last-of-type{border-bottom:none}
.cr-r{flex:1;min-width:0}
.cr-hd{display:flex;gap:7px;align-items:center;margin-bottom:3px}
.cr-au{font-size:12px;font-weight:500}
.cr-tm{font-size:10px;color:var(--text-tertiary)}
.cr-tx{font-size:12px;color:var(--text-primary);line-height:1.5}
.cr-acts{display:flex;gap:10px;margin-top:3px}
.cr-act{font-size:11px;color:var(--text-tertiary);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font)}
.cr-act:hover{color:#185FA5}
.cr-edit-ta{width:100%;font-size:12px;padding:5px 8px;border-radius:var(--radius-md);border:.5px solid var(--border-mid);
  background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);resize:none;line-height:1.5}
.cr-edit-ta:focus{outline:none;border-color:#185FA5}

.ct-foot{padding:8px 12px;border-top:.5px solid var(--border-light);background:var(--bg-secondary)}
.cf-ta{font-size:12px;padding:6px 9px;border-radius:var(--radius-md);border:.5px solid var(--border-mid);
  background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);resize:none;width:100%;line-height:1.5}
.cf-ta:focus{outline:none;border-color:#185FA5}
.cf-btns{display:flex;gap:6px;justify-content:space-between;align-items:center;margin-top:7px}
.btn-resolve{font-size:11px;padding:4px 9px;border-radius:var(--radius-md);border:.5px solid #3B6D11;
  background:none;color:#3B6D11;cursor:pointer;font-family:var(--font)}
.btn-resolve:hover{background:#EAF3DE}
.btn-reopen{font-size:11px;padding:4px 9px;border-radius:var(--radius-md);border:.5px solid var(--border-mid);
  background:none;color:var(--text-secondary);cursor:pointer;font-family:var(--font)}
.btn-reopen:hover{background:var(--bg-secondary)}
.btn-send{font-size:12px;padding:5px 12px;border-radius:var(--radius-md);background:#185FA5;color:#fff;border:none;cursor:pointer;font-family:var(--font)}
.btn-send:hover{background:#0C447C}

/* new general comment */
.vfoot{padding:12px 14px;border-top:.5px solid var(--border-light);background:var(--bg-secondary);flex-shrink:0}
.vf-hint{font-size:12px;color:var(--text-tertiary);margin-bottom:7px;line-height:1.4}
.vf-ta{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--radius-md);border:.5px solid var(--border-mid);
  background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);resize:none;min-height:56px;line-height:1.5}
.vf-ta:focus{outline:none;border-color:#185FA5}
.vf-btns{display:flex;justify-content:flex-end;gap:7px;margin-top:7px}

.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.empty{text-align:center;padding:24px;color:var(--text-tertiary);font-size:13px;line-height:1.6}

/* upload prompt */
.upload-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:48px}
.upload-box{border:2px dashed var(--border-mid);border-radius:var(--radius-xl);padding:48px;text-align:center;cursor:pointer;transition:all .15s;max-width:420px;width:100%}
.upload-box:hover,.upload-box.drag{background:var(--blue-50);border-color:#185FA5}
.upload-box h3{font-size:18px;font-weight:500;margin-bottom:6px}
.upload-box p{font-size:13px;color:var(--text-secondary)}
.ub-ico{font-size:44px;margin-bottom:16px}
</style>
</head>
<body>
<div class="vapp">

<div class="vtop">
  <button class="vback" onclick="goBack()">&#8592; Kembali</button>
  <span class="vdoc-name" id="vdoc-name">—</span>
  <div class="vtb" id="vtb"></div>
</div>

<div class="vmain">
  <div class="vscroll" id="vscroll">
    <!-- draw toolbar injected here for images -->
  </div>

  <div class="vpanel">
    <div class="vph">
      <div class="vph-title">Catatan &amp; Anotasi</div>
      <div class="vfrow">
        <button class="vfbtn on" id="f-all"    onclick="setFilter('all')">Semua</button>
        <button class="vfbtn"    id="f-open"   onclick="setFilter('open')">Open</button>
        <button class="vfbtn"    id="f-closed" onclick="setFilter('closed')">Closed</button>
      </div>
    </div>
    <div class="vpbody" id="vpbody"></div>
    <div class="vfoot">
      <div class="vf-hint" id="vf-hint">Klik area dokumen untuk anotasi posisi spesifik</div>
      <textarea class="vf-ta" id="vf-ta" placeholder="Atau tulis catatan umum…" rows="2"></textarea>
      <div class="vf-btns">
        <button class="btn" onclick="document.getElementById('vf-ta').value=''">Batal</button>
        <button class="btn btn-blue" onclick="postGeneral()">Kirim</button>
      </div>
    </div>
  </div>
</div>
</div>

<script>
/* ── helpers ── */
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const uid=()=>Date.now()+Math.random();
const now=()=>new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})+', '+new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short'});

/* ── current user ── */
const ME=(()=>{try{const u=sessionStorage.getItem('sd_user');return u?JSON.parse(u):{}}catch(e){return{}}})();
const ME_NAME=ME.name||'Anda'; const ME_INI=ME.initials||'?';
const ROLE_COL={'engineer':'#B5D4F4','supervisor':'#C0DD97','manager':'#FAC775','owner':'#CECBF6'};
const ROLE_TC ={'engineer':'#0C447C','supervisor':'#27500A','manager':'#633806','owner':'#3C3489'};
const ME_COL=ROLE_COL[ME.role]||'#B5D4F4';
const ME_TC =ROLE_TC[ME.role] ||'#0C447C';

/* ── URL params ── */
const P=new URLSearchParams(location.search);
const DOC_ID =P.get('docId');
const TASK_ID=P.get('taskId');
const RETURN =P.get('return')||'../pages/kanban.html';

/* ── annotation store ── */
const ANN_KEY='sd_anns_'+DOC_ID;
const getAnns=()=>{try{const s=sessionStorage.getItem(ANN_KEY);return s?JSON.parse(s):[]}catch(e){return[]}};
const saveAnns=a=>{try{sessionStorage.setItem(ANN_KEY,JSON.stringify(a))}catch(e){}};

/* ── doc store ── */
const getDocs=()=>{try{const s=sessionStorage.getItem('sd_docs');return s?JSON.parse(s):[]}catch(e){return[]}};
const saveDocs=d=>{try{sessionStorage.setItem('sd_docs',JSON.stringify(d))}catch(e){}};

/* ── state ── */
let mode='draw';        // 'draw' | 'annotate'
let drawColor='#E24B4A';
let drawSize=4;
let pdfScale=1.4;
let docType=null;
let imgWrap=null;       // the .img-wrap div
let drawCtx=null;       // draw canvas 2d context
let isDown=false;
let lastX=0,lastY=0;
let strokeHistory=[];   // ImageData snapshots for undo
let filterMode='all';

/* ── init ── */
window.addEventListener('load',()=>{
  const doc=getDocs().find(d=>String(d.id)===String(DOC_ID));
  if(!doc){showUpload();return;}
  $('vdoc-name').textContent=doc.name;
  const ext=(doc.ext||'').toLowerCase();
  docType=['png','jpg','jpeg','gif','webp','bmp'].includes(ext)?'image':ext==='pdf'?'pdf':'other';

  if(doc.dataUrl){
    if(docType==='image') initImage(doc.dataUrl);
    else if(docType==='pdf') initPDF(doc.dataUrl);
    else showUnsupported();
  } else { showUpload(doc.name,docType); }
  renderPanel();
});

function goBack(){try{history.back()}catch(e){location.href=RETURN;}}

/* ── UPLOAD PROMPT ── */
function showUpload(name,type){
  $('vscroll').innerHTML=`
    <div class="upload-prompt">
      <div class="upload-box" id="drop-box"
        onclick="$('vfile').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="dropFile(event)">
        <div class="ub-ico">${type==='pdf'?'📄':'🖼'}</div>
        <h3>${name?'Unggah '+name:'Unggah dokumen'}</h3>
        <p>${type==='pdf'?'File PDF (.pdf)':'Gambar (PNG, JPG, WEBP)'}<br>Klik atau seret ke sini</p>
      </div>
    </div>
    <input type="file" id="vfile" style="display:none"
      accept="${type==='pdf'?'.pdf':'image/*,.png,.jpg,.jpeg,.gif,.webp'}"
      onchange="loadFile(this.files[0])">`;
}
function dropFile(ev){
  ev.preventDefault(); $('drop-box')?.classList.remove('drag');
  const f=ev.dataTransfer.files[0]; if(f)loadFile(f);
}
function loadFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    const docs=getDocs();
    const idx=docs.findIndex(d=>String(d.id)===String(DOC_ID));
    if(idx>=0){docs[idx].dataUrl=dataUrl;docs[idx].name=file.name;}
    else docs.push({id:DOC_ID,name:file.name,size:file.size,ext:file.name.split('.').pop().toLowerCase(),dataUrl,taskId:TASK_ID,addedBy:ME_NAME,time:'Baru saja'});
    saveDocs(docs);
    $('vdoc-name').textContent=file.name;
    const ext=file.name.split('.').pop().toLowerCase();
    docType=['png','jpg','jpeg','gif','webp'].includes(ext)?'image':ext==='pdf'?'pdf':'other';
    $('vscroll').innerHTML='';
    if(docType==='image')initImage(dataUrl);
    else if(docType==='pdf')initPDF(dataUrl);
    else showUnsupported();
  };
  reader.readAsDataURL(file);
}
function showUnsupported(){$('vscroll').innerHTML='<div style="margin:auto;color:var(--text-tertiary);font-size:14px;padding:48px">Format tidak didukung untuk preview.</div>';}

/* ================================================================
   IMAGE MODE
   ================================================================ */
function initImage(dataUrl){
  const scr=$('vscroll');
  scr.innerHTML='';
  buildImageToolbar();
  buildImageTopbar();

  const img=new Image();
  img.onload=()=>{
    const maxW=Math.min(900,scr.clientWidth-64||860);
    const scale=Math.min(1,maxW/img.naturalWidth);
    const W=Math.round(img.naturalWidth*scale);
    const H=Math.round(img.naturalHeight*scale);

    /* wrapper */
    imgWrap=document.createElement('div');
    imgWrap.className='img-wrap';
    imgWrap.style.cssText=`width:${W}px;height:${H}px;position:relative`;

    /* base canvas */
    const base=document.createElement('canvas');
    base.id='base-canvas'; base.width=W; base.height=H;
    base.style.cssText='position:absolute;top:0;left:0;z-index:1;pointer-events:none';
    base.getContext('2d').drawImage(img,0,0,W,H);

    /* DRAW CANVAS — z-index:2 by default, pointer-events auto */
    const dc=document.createElement('canvas');
    dc.id='draw-canvas'; dc.width=W; dc.height=H;
    dc.style.cssText='position:absolute;top:0;left:0;z-index:2';
    drawCtx=dc.getContext('2d');

    /* PIN LAYER — z-index:3, pointer-events controlled by mode */
    const pl=document.createElement('div');
    pl.className='pin-layer'; pl.id='pin-layer';
    pl.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none';

    imgWrap.appendChild(base);
    imgWrap.appendChild(dc);
    imgWrap.appendChild(pl);
    scr.appendChild(imgWrap);

    /* restore any existing strokes */
    const saved=sessionStorage.getItem('sd_strokes_'+DOC_ID);
    if(saved){const si=new Image();si.onload=()=>drawCtx.drawImage(si,0,0);si.src=saved;}

    /* place existing pins */
    getAnns().filter(a=>a.pageIdx===1).forEach(a=>placePin(a));

    /* attach draw events to draw canvas */
    attachDraw(dc);
    /* attach annotate click to pin layer */
    pl.addEventListener('click',e=>onCanvasClick(e,imgWrap,1));

    setMode('draw'); // start in draw mode
  };
  img.onerror=()=>{ $('vscroll').innerHTML='<div style="margin:auto;color:#E24B4A;font-size:14px;padding:48px">Gagal memuat gambar.</div>'; };
  img.src=dataUrl;
}

/* ── mode switching ── */
function setMode(m){
  mode=m;
  const dc=$('draw-canvas');
  const pl=$('pin-layer');
  const btnDraw=$('btn-mode-draw');
  const btnAnn =$('btn-mode-ann');
  if(!dc||!pl)return;
  if(m==='draw'){
    /* draw canvas intercepts mouse, pin layer passive */
    dc.style.pointerEvents='auto';
    dc.style.cursor='crosshair';
    pl.style.pointerEvents='none';
    if(btnDraw)btnDraw.classList.add('on');
    if(btnAnn) btnAnn.classList.remove('on');
    $('vf-hint').textContent='Mode menggambar aktif. Gunakan mode Anotasi untuk tambah catatan.';
  } else {
    /* pin layer intercepts mouse, draw canvas passive */
    dc.style.pointerEvents='none';
    dc.style.cursor='';
    pl.style.pointerEvents='auto';
    pl.style.cursor='crosshair';
    if(btnDraw)btnDraw.classList.remove('on');
    if(btnAnn) btnAnn.classList.add('on');
    $('vf-hint').textContent='Mode anotasi aktif. Klik gambar untuk tambah catatan di posisi itu.';
  }
}

/* ── draw events ── */
function attachDraw(dc){
  /* mouse */
  dc.addEventListener('mousedown',e=>{
    isDown=true;
    const r=dc.getBoundingClientRect();
    lastX=e.clientX-r.left; lastY=e.clientY-r.top;
    drawCtx.beginPath(); drawCtx.moveTo(lastX,lastY);
    /* save snapshot before stroke for undo */
    strokeHistory.push(drawCtx.getImageData(0,0,dc.width,dc.height));
    if(strokeHistory.length>40)strokeHistory.shift();
  });
  dc.addEventListener('mousemove',e=>{
    if(!isDown)return;
    const r=dc.getBoundingClientRect();
    const x=e.clientX-r.left, y=e.clientY-r.top;
    drawCtx.strokeStyle=drawColor; drawCtx.lineWidth=drawSize;
    drawCtx.lineCap='round'; drawCtx.lineJoin='round';
    drawCtx.lineTo(x,y); drawCtx.stroke();
    lastX=x; lastY=y;
  });
  dc.addEventListener('mouseup',  ()=>{isDown=false; autosaveStrokes();});
  dc.addEventListener('mouseleave',()=>{isDown=false;});

  /* touch */
  dc.addEventListener('touchstart',e=>{
    e.preventDefault();
    isDown=true;
    const r=dc.getBoundingClientRect(),t=e.touches[0];
    lastX=t.clientX-r.left; lastY=t.clientY-r.top;
    drawCtx.beginPath(); drawCtx.moveTo(lastX,lastY);
    strokeHistory.push(drawCtx.getImageData(0,0,dc.width,dc.height));
    if(strokeHistory.length>40)strokeHistory.shift();
  },{passive:false});
  dc.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!isDown)return;
    const r=dc.getBoundingClientRect(),t=e.touches[0];
    const x=t.clientX-r.left, y=t.clientY-r.top;
    drawCtx.strokeStyle=drawColor; drawCtx.lineWidth=drawSize;
    drawCtx.lineCap='round'; drawCtx.lineJoin='round';
    drawCtx.lineTo(x,y); drawCtx.stroke();
    lastX=x; lastY=y;
  },{passive:false});
  dc.addEventListener('touchend',()=>{isDown=false; autosaveStrokes();});
}

function autosaveStrokes(){
  const dc=$('draw-canvas'); if(!dc)return;
  try{sessionStorage.setItem('sd_strokes_'+DOC_ID, dc.toDataURL());}catch(e){}
}

/* ── draw toolbar ── */
function buildImageToolbar(){
  const scr=$('vscroll');
  const tb=document.createElement('div');
  tb.className='draw-toolbar show'; tb.id='draw-toolbar';
  const colors=['#E24B4A','#185FA5','#1D9E75','#D85A30','#7F77DD','#1a1a18','#ffffff'];
  tb.innerHTML=`
    <span class="dt-label">Warna:</span>
    ${colors.map(c=>`<div class="dt-swatch${c===drawColor?' sel':''}" style="background:${c};${c==='#ffffff'?'border:1px solid #ccc':''}" onclick="pickColor('${c}',this)" title="${c}"></div>`).join('')}
    <div class="dt-sep"></div>
    <span class="dt-label">Tebal:</span>
    <input class="dt-slider" type="range" min="1" max="20" value="${drawSize}" step="1"
      oninput="drawSize=+this.value;updateSzPreview(this.value)">
    <div class="sz-preview"><div id="sz-dot" style="width:${drawSize}px;height:${drawSize}px;border-radius:50%;background:${drawColor}"></div></div>
    <div class="dt-sep"></div>
    <button class="dt-btn" onclick="undoDraw()" title="Undo (Ctrl+Z)">&#8617;</button>
    <button class="dt-btn" onclick="clearDraw()" title="Hapus semua coretan">&#x2715;</button>
    <div class="dt-sep"></div>
    <button class="dt-btn" onclick="saveImage()" title="Simpan gambar" style="font-size:12px;width:auto;padding:0 10px">&#8659; Simpan</button>`;
  scr.appendChild(tb);
}

function buildImageTopbar(){
  $('vtb').innerHTML=`
    <button class="vtbtn on" id="btn-mode-draw" onclick="setMode('draw')">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 12l2-5L11 1l2 2-7 7-5 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      Gambar
    </button>
    <button class="vtbtn" id="btn-mode-ann" onclick="setMode('annotate')">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2"/><path d="M8.5 8.5l3.5 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Anotasi
    </button>
    <div class="vsep"></div>
    <button class="vtbtn" onclick="saveImage()">&#8659; Simpan &amp; Unduh</button>`;
}

function pickColor(c,el){
  drawColor=c;
  document.querySelectorAll('.dt-swatch').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
  updateSzPreview(drawSize);
}
function updateSzPreview(sz){
  const dot=$('sz-dot'); if(!dot)return;
  dot.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;background:${drawColor}`;
}
function undoDraw(){
  if(!drawCtx||!strokeHistory.length)return;
  const snap=strokeHistory.pop();
  drawCtx.putImageData(snap,0,0);
  autosaveStrokes();
}
function clearDraw(){
  if(!drawCtx||!$('draw-canvas'))return;
  strokeHistory.push(drawCtx.getImageData(0,0,$('draw-canvas').width,$('draw-canvas').height));
  drawCtx.clearRect(0,0,$('draw-canvas').width,$('draw-canvas').height);
  autosaveStrokes();
}
function saveImage(){
  const base=$('base-canvas'); const draw=$('draw-canvas'); if(!base)return;
  const merged=document.createElement('canvas');
  merged.width=base.width; merged.height=base.height;
  const ctx=merged.getContext('2d');
  ctx.drawImage(base,0,0);
  if(draw)ctx.drawImage(draw,0,0);
  const url=merged.toDataURL('image/png');
  /* download */
  const a=document.createElement('a');
  a.href=url; a.download='markup_'+Date.now()+'.png'; a.click();
  /* save back to doc */
  const docs=getDocs();
  const idx=docs.findIndex(d=>String(d.id)===String(DOC_ID));
  if(idx>=0){docs[idx].dataUrl=url;saveDocs(docs);}
  /* visual feedback */
  const btn=event.target.closest('button');
  if(btn){const orig=btn.textContent;btn.textContent='✓ Tersimpan!';setTimeout(()=>btn.textContent=orig,1800);}
}

/* keyboard undo */
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoDraw();}});

/* ================================================================
   PDF MODE
   ================================================================ */
function initPDF(dataUrl){
  const scr=$('vscroll');
  scr.innerHTML='<div style="margin:auto;color:var(--text-tertiary);font-size:13px;padding:48px">Memuat PDF…</div>';
  buildPDFTopbar();
  if(window.pdfjsLib){renderPDF(dataUrl);return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload=()=>{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';renderPDF(dataUrl);};
  document.head.appendChild(s);
}

function buildPDFTopbar(){
  $('vtb').innerHTML=`
    <button class="vtbtn" id="btn-pdf-ann" onclick="togglePDFAnnotate()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2"/><path d="M8.5 8.5l3.5 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Mode Anotasi
    </button>
    <div class="vsep"></div>
    <button class="vtbtn" onclick="zoomPDF(-0.2)">&#8722; Kecil</button>
    <span id="zoom-lbl" style="font-size:12px;color:var(--text-secondary);min-width:40px;text-align:center">100%</span>
    <button class="vtbtn" onclick="zoomPDF(0.2)">&#43; Besar</button>`;
}

let pdfAnnotate=false;
function togglePDFAnnotate(){
  pdfAnnotate=!pdfAnnotate;
  $('btn-pdf-ann')?.classList.toggle('on',pdfAnnotate);
  document.querySelectorAll('.pdf-page .pin-layer').forEach(pl=>{
    pl.style.pointerEvents=pdfAnnotate?'auto':'none';
    pl.style.cursor=pdfAnnotate?'crosshair':'default';
  });
  $('vf-hint').textContent=pdfAnnotate
    ?'Mode anotasi aktif — klik halaman untuk tambah catatan.'
    :'Klik tombol "Mode Anotasi" untuk menambah catatan ke dokumen.';
}

async function renderPDF(dataUrl){
  const scr=$('vscroll'); scr.innerHTML='';
  try{
    const bytes=atob(dataUrl.split(',')[1]);
    const arr=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
    const pdf=await pdfjsLib.getDocument({data:arr}).promise;
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const vp=page.getViewport({scale:pdfScale});
      const pageDiv=document.createElement('div');
      pageDiv.className='pdf-page'; pageDiv.dataset.page=p;
      pageDiv.style.cssText=`width:${vp.width}px;height:${vp.height}px;position:relative`;
      const canvas=document.createElement('canvas');
      canvas.width=vp.width; canvas.height=vp.height;
      canvas.style.cssText='position:absolute;top:0;left:0;z-index:1';
      const pl=document.createElement('div');
      pl.className='pin-layer'; pl.style.cssText='z-index:2;pointer-events:none;cursor:default';
      pageDiv.appendChild(canvas); pageDiv.appendChild(pl);
      scr.appendChild(pageDiv);
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      /* page number label */
      const lbl=document.createElement('div');
      lbl.style.cssText='text-align:center;font-size:11px;color:#888;padding:4px 0';
      lbl.textContent=`Halaman ${p} / ${pdf.numPages}`;
      scr.appendChild(lbl);
      /* place pins */
      getAnns().filter(a=>a.pageIdx===p).forEach(a=>placePinOnPage(a,pageDiv));
      /* click to annotate */
      pl.addEventListener('click',e=>onCanvasClick(e,pageDiv,p));
    }
  }catch(e){
    scr.innerHTML=`<div style="margin:auto;color:#E24B4A;font-size:13px;padding:48px">Gagal memuat PDF: ${e.message}</div>`;
  }
}
function zoomPDF(d){
  pdfScale=Math.max(0.5,Math.min(3,pdfScale+d));
  $('zoom-lbl').textContent=Math.round(pdfScale/1.4*100)+'%';
  const doc=getDocs().find(d=>String(d.id)===String(DOC_ID));
  if(doc?.dataUrl)renderPDF(doc.dataUrl);
}

/* ================================================================
   ANNOTATION — shared
   ================================================================ */
function onCanvasClick(e,container,pageIdx){
  if(docType==='image'&&mode!=='annotate')return;
  if(docType==='pdf'&&!pdfAnnotate)return;
  if(e.target.closest('.ann-pin,.ann-tip,.ann-form'))return;
  e.stopPropagation();
  const r=container.getBoundingClientRect();
  const xPct=((e.clientX-r.left)/r.width*100).toFixed(2);
  const yPct=((e.clientY-r.top)/r.height*100).toFixed(2);
  closeTooltips(); closePendingForm();
  showAnnForm(container,+xPct,+yPct,pageIdx);
}

function showAnnForm(container,xPct,yPct,pageIdx){
  /* keep form inside bounds */
  const fl=Math.min(xPct, 60);
  const ft=Math.min(yPct, 70);
  const form=document.createElement('div');
  form.className='ann-form'; form.id='ann-form-pending';
  form.style.cssText=`left:${fl}%;top:${ft}%;z-index:20`;
  form.innerHTML=`
    <div style="font-size:12px;font-weight:500;margin-bottom:7px">Tambah anotasi di posisi ini</div>
    <textarea id="ann-inp" placeholder="Tulis catatan…" rows="3"></textarea>
    <div class="ann-form-btns">
      <button class="btn" style="font-size:12px;padding:4px 10px" onclick="closePendingForm()">Batal</button>
      <button class="btn btn-blue" style="font-size:12px;padding:4px 10px"
        onclick="submitAnn(${xPct},${yPct},${pageIdx},event)">Tambah</button>
    </div>`;
  container.appendChild(form);
  setTimeout(()=>$('ann-inp')?.focus(),40);
}

function submitAnn(xPct,yPct,pageIdx,ev){
  const text=$('ann-inp')?.value?.trim(); if(!text)return;
  const ann={id:uid(),xPct,yPct,pageIdx,
    author:ME_NAME,initials:ME_INI,col:ME_COL,tc:ME_TC,
    time:now(),text,resolved:false,replies:[]};
  const anns=getAnns(); anns.push(ann); saveAnns(anns);
  closePendingForm();
  /* find container */
  const container=ev.target.closest('.pdf-page,.img-wrap');
  if(container)placePinOnPage(ann,container);
  renderPanel();
  setTimeout(()=>{
    const el=$('ct-'+ann.id);
    if(el){el.scrollIntoView({behavior:'smooth'});el.style.outline='2px solid #185FA5';setTimeout(()=>el.style.outline='',1400);}
  },120);
}

function placePinOnPage(ann, container){
  const pl=container.querySelector('.pin-layer'); if(!pl)return;
  const pin=document.createElement('div');
  pin.className='ann-pin'; pin.id='pin-'+ann.id;
  pin.style.cssText=`position:absolute;left:${ann.xPct}%;top:${ann.yPct}%;transform:translate(-50%,-100%);z-index:10;cursor:pointer`;
  pin.innerHTML=pinSVG(ann.resolved);
  pin.addEventListener('click',e=>{e.stopPropagation();showTip(ann,pin,container);});
  pl.appendChild(pin);
}
/* alias for image mode */
const placePin=ann=>{
  const iw=imgWrap||document.querySelector('.img-wrap'); if(!iw)return;
  placePinOnPage(ann,iw);
};

function pinSVG(resolved){
  const fill=resolved?'#3B6D11':'#E24B4A';
  return `<svg width="26" height="32" viewBox="0 0 26 32" style="filter:drop-shadow(0 1px 3px rgba(0,0,0,.35))">
    <path d="M13 2C7.48 2 3 6.48 3 12c0 7 10 18 10 18s10-11 10-18c0-5.52-4.48-10-10-10z" fill="${fill}"/>
    ${resolved
      ?`<path d="M9 12l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/>`
      :`<text x="13" y="16" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" font-family="sans-serif">!</text>`}
  </svg>`;
}

function showTip(ann,pin,container){
  closeTooltips();
  const tip=document.createElement('div');
  tip.className='ann-tip'; tip.id='tip-'+ann.id;
  tip.style.cssText=`left:${ann.xPct}%;top:${ann.yPct}%;`;
  const rc=ann.replies?.length||0;
  tip.innerHTML=`
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
      <div class="av" style="background:${ann.col};color:${ann.tc};width:22px;height:22px;font-size:9px">${ann.initials}</div>
      <span style="font-size:12px;font-weight:500">${esc(ann.author)}</span>
      <span style="font-size:10px;color:var(--text-tertiary);margin-left:auto">${ann.time}</span>
    </div>
    <div style="font-size:12px;line-height:1.5;margin-bottom:7px">${esc(ann.text)}</div>
    <div style="display:flex;gap:8px;align-items:center">
      ${rc?`<span style="font-size:11px;color:var(--text-tertiary)">${rc} balasan</span>`:''}
      <button onclick="scrollThread('${ann.id}')" style="font-size:11px;background:none;border:none;cursor:pointer;color:#185FA5;padding:0;font-family:var(--font)">Lihat &#8594;</button>
      <button onclick="closeTooltips()" style="font-size:11px;background:none;border:none;cursor:pointer;color:var(--text-tertiary);padding:0;font-family:var(--font);margin-left:auto">&#x2715;</button>
    </div>`;
  tip.addEventListener('click',e=>e.stopPropagation());
  container.appendChild(tip);
}

function closeTooltips(){document.querySelectorAll('.ann-tip').forEach(t=>t.remove());}
function closePendingForm(){$('ann-form-pending')?.remove();}

function scrollThread(id){
  closeTooltips(); setFilter('all');
  setTimeout(()=>{
    const el=$('ct-'+id); if(!el)return;
    el.scrollIntoView({behavior:'smooth'});
    el.style.outline='2px solid #185FA5';
    setTimeout(()=>el.style.outline='',1400);
    $('ct-body-'+id)?.classList.add('open');
  },80);
}

/* ================================================================
   COMMENT PANEL
   ================================================================ */
function setFilter(f){
  filterMode=f;
  ['all','open','closed'].forEach(x=>$('f-'+x)?.classList.toggle('on',x===f));
  renderPanel();
}

function renderPanel(){
  const all=getAnns();
  let list=filterMode==='open'?all.filter(a=>!a.resolved):filterMode==='closed'?all.filter(a=>a.resolved):all;
  const body=$('vpbody');
  if(!list.length){
    body.innerHTML=`<div class="empty">${
      filterMode==='all'?'Belum ada anotasi.<br>Klik area dokumen untuk menambah catatan.':
      filterMode==='open'?'Tidak ada anotasi open.':'Tidak ada anotasi closed.'
    }</div>`;
    return;
  }
  body.innerHTML=list.map(a=>threadHtml(a)).join('');
}

function threadHtml(a){
  const rc=a.replies?.length||0;
  const repliesHtml=(a.replies||[]).map((r,ri)=>`
    <div class="creply" id="rep-${a.id}-${ri}">
      <div class="av" style="background:${r.col||ME_COL};color:${r.tc||ME_TC};width:22px;height:22px;font-size:9px">${r.ini||r.initials||'?'}</div>
      <div class="cr-r">
        <div class="cr-hd"><span class="cr-au">${esc(r.author)}</span><span class="cr-tm">${r.time}</span>${r.edited?'<span style="font-size:10px;color:var(--text-tertiary)">(diedit)</span>':''}</div>
        <div class="cr-tx" id="rtx-${a.id}-${ri}">${esc(r.text)}</div>
        <div id="ref-${a.id}-${ri}" style="display:none">
          <textarea class="cr-edit-ta" id="rei-${a.id}-${ri}" rows="2">${esc(r.text)}</textarea>
          <div class="cr-acts"><button class="cr-act" onclick="saveEdit('${a.id}',${ri})">Simpan</button><button class="cr-act" onclick="cancelEdit('${a.id}',${ri})">Batal</button></div>
        </div>
        <div class="cr-acts">
          <button class="cr-act" onclick="startEdit('${a.id}',${ri})">Edit</button>
          <button class="cr-act" style="color:#E24B4A" onclick="delReply('${a.id}',${ri})">Hapus</button>
        </div>
      </div>
    </div>`).join('');

  return `<div class="cthread${a.resolved?' resolved':''}" id="ct-${a.id}">
    <div class="ct-head" onclick="toggleThread('${a.id}')">
      <div class="av" style="background:${a.col};color:${a.tc}">${a.initials}</div>
      <div class="ct-meta">
        <div class="ct-author">${esc(a.author)}</div>
        <div class="ct-time">${a.time}</div>
        <div class="ct-prev">${esc(a.text)}</div>
        <div class="ct-tags">
          <span class="ct-pg">p.${a.pageIdx}</span>
          ${a.resolved?`<span class="ct-closed">&#10003; Closed</span>`:`<span class="ct-open">Open</span>`}
        </div>
      </div>
      ${rc?`<span class="ct-rc">${rc} balasan</span>`:''}
    </div>
    <div class="ct-body" id="ct-body-${a.id}">
      ${repliesHtml}
      <div class="ct-foot">
        <textarea class="cf-ta" id="cft-${a.id}" placeholder="Tulis balasan…" rows="2"></textarea>
        <div class="cf-btns">
          ${a.resolved
            ?`<button class="btn-reopen" onclick="reopen('${a.id}')">&#8635; Reopen</button>`
            :`<button class="btn-resolve" onclick="resolve('${a.id}')">&#10003; Close</button>`}
          <button class="btn-send" onclick="postReply('${a.id}')">Kirim</button>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleThread(id){ $('ct-body-'+id)?.classList.toggle('open'); }

function postReply(annId){
  const inp=$('cft-'+annId); if(!inp)return;
  const text=inp.value.trim(); if(!text)return;
  const anns=getAnns(); const a=anns.find(a=>String(a.id)===String(annId)); if(!a)return;
  a.replies=a.replies||[];
  a.replies.push({author:ME_NAME,ini:ME_INI,initials:ME_INI,col:ME_COL,tc:ME_TC,time:now(),text});
  saveAnns(anns); inp.value='';
  renderPanel();
  setTimeout(()=>{ $('ct-body-'+annId)?.classList.add('open'); },50);
}

function resolve(annId){
  const anns=getAnns(); const a=anns.find(a=>String(a.id)===String(annId)); if(!a)return;
  a.resolved=true; saveAnns(anns);
  updatePin(annId,true); renderPanel();
}
function reopen(annId){
  const anns=getAnns(); const a=anns.find(a=>String(a.id)===String(annId)); if(!a)return;
  a.resolved=false; saveAnns(anns);
  updatePin(annId,false); renderPanel();
}
function updatePin(annId,resolved){
  const pin=$('pin-'+annId); if(!pin)return;
  pin.innerHTML=pinSVG(resolved);
}

function startEdit(annId,ri){
  $('rtx-'+annId+'-'+ri).style.display='none';
  $('ref-'+annId+'-'+ri).style.display='block';
  $('rei-'+annId+'-'+ri)?.focus();
}
function cancelEdit(annId,ri){
  $('rtx-'+annId+'-'+ri).style.display='';
  $('ref-'+annId+'-'+ri).style.display='none';
}
function saveEdit(annId,ri){
  const val=$('rei-'+annId+'-'+ri)?.value?.trim(); if(!val)return;
  const anns=getAnns(); const a=anns.find(a=>String(a.id)===String(annId)); if(!a||!a.replies[ri])return;
  a.replies[ri].text=val; a.replies[ri].edited=true; saveAnns(anns);
  renderPanel();
  setTimeout(()=>{ $('ct-body-'+annId)?.classList.add('open'); },50);
}
function delReply(annId,ri){
  if(!confirm('Hapus balasan ini?'))return;
  const anns=getAnns(); const a=anns.find(a=>String(a.id)===String(annId)); if(!a)return;
  a.replies.splice(ri,1); saveAnns(anns);
  renderPanel();
  setTimeout(()=>{ $('ct-body-'+annId)?.classList.add('open'); },50);
}

function postGeneral(){
  const text=$('vf-ta')?.value?.trim(); if(!text)return;
  const ann={id:uid(),xPct:2,yPct:2,pageIdx:1,
    author:ME_NAME,initials:ME_INI,col:ME_COL,tc:ME_TC,
    time:now(),text,resolved:false,replies:[],general:true};
  const anns=getAnns(); anns.push(ann); saveAnns(anns);
  $('vf-ta').value=''; renderPanel();
}

/* click outside tooltips */
document.addEventListener('click',e=>{
  if(!e.target.closest('.ann-tip,.ann-pin'))closeTooltips();
});
</script>
