<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — ShipDesign</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .dash-body { padding: 0 20px 32px; }

    /* phase progress */
    .phase-bar-row { margin-bottom: 16px; }
    .phase-bar-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .phase-bar-name { font-size: 13px; color: var(--text-secondary); }
    .phase-bar-stat { font-size: 12px; font-weight: 500; color: var(--text-primary); }
    .pbar-bg { height: 10px; background: var(--bg-secondary); border-radius: 5px; overflow: hidden; }
    .pbar-fill { height: 10px; border-radius: 5px; transition: width .5s ease; }

    /* category grid */
    .cat-grid {
      display: grid; grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px; margin-bottom: 24px;
    }
    .cat-card {
      background: var(--bg-secondary); border-radius: var(--radius-md);
      padding: 12px 14px;
    }
    .cat-name  { font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: capitalize; }
    .cat-pct   { font-size: 20px; font-weight: 500; color: var(--text-primary); }
    .cat-sub   { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    /* donut chart (pure CSS) */
    .donut-wrap { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; margin-bottom: 24px; }
    .donut-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .donut-label { font-size: 12px; color: var(--text-secondary); }

    /* activity */
    .activity-list {
      background: var(--bg-primary); border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .act-row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 14px; border-bottom: 0.5px solid var(--border-light);
      font-size: 12px;
    }
    .act-row:last-child { border-bottom: none; }
    .act-title { flex: 1; color: var(--text-primary); }
    .act-ph { font-size: 11px; padding: 2px 7px; border-radius: 8px; font-weight: 500; white-space: nowrap; }
    .act-time { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }

    /* mini bar chart */
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin: 0 0 6px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .bar-fill { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; }
    .bar-col-label { font-size: 10px; color: var(--text-tertiary); margin-top: 4px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .widget-box {
      background: var(--bg-primary); border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg); padding: 16px;
    }
    .widget-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; }
  </style>
</head>
<body>
<script src="../js/data.js"></script>
<script>document.write(renderShell('dash'));</script>

<div class="content-header">
  <span class="page-title">Dashboard</span>
  <span class="badge">Progress overview</span>
  <div class="header-right">
    <button class="btn" onclick="location.reload()">Refresh</button>
  </div>
</div>

<div class="dash-body" id="dash-body"></div>

<script>
document.write(closeShell());

const tasks = getTasks();

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function render() {
  const total   = tasks.length;
  const done    = tasks.filter(t => t.status === 'done').length;
  const inprog  = tasks.filter(t => t.status === 'in-progress').length;
  const overdue = tasks.filter(t => t.status === 'overdue').length;
  const todo    = tasks.filter(t => t.status === 'todo').length;
  const pct     = Math.round(done / total * 100);

  const fullyApproved = tasks.filter(t => t.approval && t.approval.steps.every(s=>s.approved)).length;
  const pendingAppr   = tasks.filter(t => t.approval && !t.approval.steps.every(s=>s.approved) && t.approval.steps.some(s=>s.approved)).length;
  const stats = [
    { label: 'Total deliverables', val: total,         sub: 'semua fase',           color: null },
    { label: 'Selesai',            val: done,           sub: pct + '% complete',     color: '#3B6D11', fill: '#639922' },
    { label: 'Fully approved',     val: fullyApproved,  sub: '4/4 level disetujui',  color: '#3C3489', fill: '#7F77DD' },
    { label: 'Terlambat',          val: overdue,        sub: 'perlu perhatian',      color: '#A32D2D', fill: '#E24B4A' },
  ];

  let html = `<div class="stat-row">`;
  stats.forEach(s => {
    const w = s.fill ? Math.round(s.val / total * 100) : 0;
    html += `<div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-val"${s.color ? ` style="color:${s.color}"` : ''}>${s.val}</div>
      <div class="stat-sub">${s.sub}</div>
      ${s.fill ? `<div class="prog-bg"><div class="prog-fill" style="width:${w}%;background:${s.fill}"></div></div>` : ''}
    </div>`;
  });
  html += `</div>`;

  /* phase progress */
  html += `<div class="dash-body"><div class="section-title" style="padding-top:8px">Progress per fase</div>`;
  Object.entries(PHASES).forEach(([key, p]) => {
    const pt = tasks.filter(t => t.phase === key);
    const pd = pt.filter(t => t.status === 'done').length;
    const pp = pt.length ? Math.round(pd / pt.length * 100) : 0;
    html += `<div class="phase-bar-row">
      <div class="phase-bar-meta">
        <span class="phase-bar-name"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${p.color};margin-right:6px"></span>${p.label}</span>
        <span class="phase-bar-stat">${pd} / ${pt.length} &nbsp; ${pp}%</span>
      </div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${pp}%;background:${p.color}"></div></div>
    </div>`;
  });

  /* category cards */
  html += `<div class="section-title" style="margin-top:20px">Progres per kategori</div>
  <div class="cat-grid">`;
  ['hull','machinery','electrical','hvac','production'].forEach(cat => {
    const ct = tasks.filter(t => t.cat === cat);
    const cd = ct.filter(t => t.status === 'done').length;
    const cp = ct.length ? Math.round(cd / ct.length * 100) : 0;
    html += `<div class="cat-card">
      <div class="cat-name">${capitalize(cat)}</div>
      <div class="cat-pct">${cp}%</div>
      <div class="cat-sub">${cd}/${ct.length} selesai</div>
    </div>`;
  });
  html += `</div>`;

  /* two-col: bar chart + status breakdown */
  html += `<div class="two-col">
    <div class="widget-box">
      <div class="widget-title">Deliverable per fase</div>
      <div class="bar-chart">`;
  const maxCount = Math.max(...Object.keys(PHASES).map(k => tasks.filter(t => t.phase === k).length));
  Object.entries(PHASES).forEach(([key, p]) => {
    const count = tasks.filter(t => t.phase === key).length;
    const h = Math.round(count / maxCount * 70);
    html += `<div class="bar-col">
      <div class="bar-fill" style="height:${h}px;background:${p.color}"></div>
      <div class="bar-col-label">${p.label.split(' ')[0]}</div>
    </div>`;
  });
  html += `</div></div>
    <div class="widget-box">
      <div class="widget-title">Status breakdown</div>`;
  const statusColors = { 'todo': '#888780', 'in-progress': '#185FA5', 'done': '#639922', 'overdue': '#E24B4A' };
  Object.entries(STATUS_CFG).forEach(([s, c]) => {
    const count = tasks.filter(t => t.status === s).length;
    const w = Math.round(count / total * 100);
    html += `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span style="color:var(--text-secondary)">${c.label}</span>
        <span style="font-weight:500">${count}</span>
      </div>
      <div style="height:6px;background:var(--bg-secondary);border-radius:3px;overflow:hidden">
        <div style="height:6px;width:${w}%;background:${statusColors[s]};border-radius:3px"></div>
      </div>
    </div>`;
  });
  html += `</div></div>`;

  /* approval overview */
  html += `<div class="section-title" style="margin-top:4px">Approval progress per fase</div>
  <div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px">`;
  Object.entries(PHASES).forEach(([key,p]) => {
    const pt = tasks.filter(t=>t.phase===key);
    const fa = pt.filter(t=>t.approval&&t.approval.steps.every(s=>s.approved)).length;
    const p1 = pt.filter(t=>t.approval&&t.approval.steps.filter(s=>s.approved).length===1).length;
    const p2 = pt.filter(t=>t.approval&&t.approval.steps.filter(s=>s.approved).length===2).length;
    const p3 = pt.filter(t=>t.approval&&t.approval.steps.filter(s=>s.approved).length===3).length;
    const p0 = pt.length - fa - p1 - p2 - p3;
    html += `<div style="padding:10px 16px;border-bottom:0.5px solid var(--border-light)">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;font-weight:500;color:var(--text-secondary)">${p.label}</span>
        <span style="font-size:11px;color:var(--text-tertiary)">${fa}/${pt.length} fully approved</span>
      </div>
      <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px">
        <div style="flex:${fa};background:#3B6D11;min-width:${fa?2:0}px" title="Fully approved: ${fa}"></div>
        <div style="flex:${p3};background:#7F77DD;min-width:${p3?2:0}px" title="3/4: ${p3}"></div>
        <div style="flex:${p2};background:#185FA5;min-width:${p2?2:0}px" title="2/4: ${p2}"></div>
        <div style="flex:${p1};background:#85B7EB;min-width:${p1?2:0}px" title="1/4: ${p1}"></div>
        <div style="flex:${p0};background:var(--bg-secondary);min-width:${p0?2:0}px" title="Pending: ${p0}"></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:5px">
        <span style="font-size:10px;color:#3B6D11">&#9632; 4/4: ${fa}</span>
        <span style="font-size:10px;color:#185FA5">&#9632; 2-3/4: ${p2+p3}</span>
        <span style="font-size:10px;color:#85B7EB">&#9632; 1/4: ${p1}</span>
        <span style="font-size:10px;color:var(--text-tertiary)">&#9632; Pending: ${p0}</span>
      </div>
    </div>`;
  });
  html += `</div>`;

  /* recent activity */
  html += `<div class="section-title">Aktivitas terbaru</div>
  <div class="activity-list">`;
  const recent = tasks.filter(t => t.status !== 'todo').slice(0, 8);
  const times = ['2 mnt lalu','5 mnt lalu','12 mnt lalu','1 jam lalu','3 jam lalu','Kemarin','Kemarin','2 hari lalu'];
  recent.forEach((t, i) => {
    const ph = PHASES[t.phase];
    const sc = STATUS_CFG[t.status];
    html += `<div class="act-row">
      <span class="act-ph" style="background:${ph.bg};color:${ph.tc}">${ph.label.split(' ')[0]}</span>
      <span class="act-title">${t.label}</span>
      <span class="chip ${sc.chip}">${sc.label}</span>
      <span class="act-time">${times[i]}</span>
    </div>`;
  });
  html += `</div></div>`;

  document.getElementById('dash-body').innerHTML = html;
}

render();
</script>
</body>
</html>
