<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gantt Chart — ShipDesign</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .gantt-outer { padding: 16px 20px 32px; overflow-x: auto; }
    .gantt-grid  {
      min-width: 760px; border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg); overflow: hidden;
      background: var(--bg-primary);
    }
    .gantt-head {
      display: grid; grid-template-columns: 260px 1fr;
      border-bottom: 0.5px solid var(--border-light);
      background: var(--bg-secondary); position: sticky; top: 0; z-index: 5;
    }
    .gh-left {
      padding: 8px 14px; font-size: 11px; font-weight: 500;
      color: var(--text-secondary); border-right: 0.5px solid var(--border-light);
    }
    .gh-right { display: flex; }
    .month-cell {
      flex: 1; text-align: center; font-size: 11px; font-weight: 500;
      color: var(--text-secondary); padding: 8px 4px;
      border-right: 0.5px solid var(--border-light);
    }
    .month-cell:last-child { border-right: none; }

    .gantt-row {
      display: grid; grid-template-columns: 260px 1fr;
      border-bottom: 0.5px solid var(--border-light); min-height: 36px;
    }
    .gantt-row:last-child { border-bottom: none; }
    .gantt-row.group-row  { background: var(--bg-secondary); }
    .gantt-row:hover .gl  { background: var(--bg-secondary); }

    .gl {
      padding: 6px 14px; font-size: 12px; color: var(--text-secondary);
      border-right: 0.5px solid var(--border-light);
      display: flex; align-items: center; gap: 8px;
    }
    .gl.group { font-weight: 500; font-size: 13px; color: var(--text-primary); }
    .gl.sub   { padding-left: 28px; }

    .gr { position: relative; display: flex; align-items: center; }
    .bar {
      position: absolute; height: 14px;
      border-radius: 3px; top: 50%; transform: translateY(-50%);
    }
    .bar-group { height: 20px; border-radius: 4px; }

    .legend {
      display: flex; gap: 16px; flex-wrap: wrap;
      padding: 12px 20px; font-size: 12px; color: var(--text-secondary);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 3px; }
  </style>
</head>
<body>
<script src="../js/data.js"></script>
<script>document.write(renderShell('gantt'));</script>

<div class="content-header">
  <span class="page-title">Gantt chart</span>
  <span class="badge">2025 — 2026</span>
  <div class="header-right">
    <select id="zoom-sel" onchange="render()">
      <option value="all">Semua fase</option>
      <option value="concept">Concept design</option>
      <option value="preliminary">Preliminary design</option>
      <option value="contract">Contract design</option>
      <option value="functional">Functional design</option>
    </select>
  </div>
</div>

<div class="legend">
  <span style="font-size:12px;color:var(--text-tertiary);margin-right:4px">Legenda:</span>
  <span class="legend-item"><span class="legend-dot" style="background:#185FA5"></span>Concept</span>
  <span class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>Preliminary</span>
  <span class="legend-item"><span class="legend-dot" style="background:#D85A30"></span>Contract</span>
  <span class="legend-item"><span class="legend-dot" style="background:#7F77DD"></span>Functional</span>
</div>

<div class="gantt-outer">
  <div class="gantt-grid" id="gantt-grid"></div>
</div>

<script>
document.write(closeShell());

const TOTAL_MONTHS = 12;
const GANTT_DATA = [
  { phase: 'concept', label: 'Concept design', startM: 0, durM: 2, color: '#185FA5', subs: [
    { label: 'Performance specification', startM: 0, durM: 1.5 },
    { label: 'Body plan & appendage sketch', startM: 0.2, durM: 1 },
    { label: 'Concept GA drawings', startM: 0.5, durM: 1.5 },
    { label: 'Weight estimate', startM: 0.8, durM: 0.8 },
    { label: 'Cost estimate & risk assessment', startM: 1.2, durM: 0.8 },
  ]},
  { phase: 'preliminary', label: 'Preliminary design', startM: 1.5, durM: 3.5, color: '#1D9E75', subs: [
    { label: 'Lines drawing', startM: 1.5, durM: 1.5 },
    { label: 'Stability analysis', startM: 2, durM: 2 },
    { label: 'HVAC load analysis', startM: 2.5, durM: 1.5 },
    { label: 'Weight report', startM: 2.2, durM: 1.2 },
    { label: 'Model test plan', startM: 3.5, durM: 1 },
    { label: 'Build strategy & production plan', startM: 4, durM: 1 },
  ]},
  { phase: 'contract', label: 'Contract design', startM: 4.5, durM: 4, color: '#D85A30', subs: [
    { label: 'Ship specification', startM: 4.5, durM: 2 },
    { label: 'Lines plan & steel scantlings', startM: 5, durM: 2.5 },
    { label: 'Piping systems analysis', startM: 5.5, durM: 2 },
    { label: 'MEL final', startM: 7, durM: 1 },
    { label: 'Trim & stability booklet', startM: 7.5, durM: 1 },
    { label: 'Safety analysis', startM: 7, durM: 1.5 },
  ]},
  { phase: 'functional', label: 'Functional design', startM: 7.5, durM: 4.5, color: '#7F77DD', subs: [
    { label: 'Hull drawings package', startM: 7.5, durM: 3 },
    { label: 'Machinery arrangement', startM: 8, durM: 2.5 },
    { label: 'Electrical one-line & diagrams', startM: 8.5, durM: 2 },
    { label: 'HVAC diagrams', startM: 9, durM: 2 },
    { label: 'Block outfitting schedule', startM: 10, durM: 1.5 },
    { label: 'AMO lists & PTS', startM: 11, durM: 1 },
  ]},
];

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function pct(v) { return (v / TOTAL_MONTHS * 100).toFixed(2) + '%'; }

function render() {
  const filter = document.getElementById('zoom-sel').value;
  const data = filter === 'all' ? GANTT_DATA : GANTT_DATA.filter(g => g.phase === filter);
  const grid = document.getElementById('gantt-grid');

  let html = `<div class="gantt-head">
    <div class="gh-left">Deliverable</div>
    <div class="gh-right">
      ${MONTHS.map(m => `<div class="month-cell">${m}</div>`).join('')}
    </div>
  </div>`;

  data.forEach(g => {
    html += `<div class="gantt-row group-row">
      <div class="gl group">
        <span style="width:10px;height:10px;border-radius:3px;background:${g.color};flex-shrink:0"></span>
        ${g.label}
      </div>
      <div class="gr">
        <div class="bar bar-group" style="left:${pct(g.startM)};width:${pct(g.durM)};background:${g.color};opacity:.15"></div>
        <div class="bar bar-group" style="left:${pct(g.startM)};width:${pct(g.durM)};border:1.5px solid ${g.color};background:none"></div>
      </div>
    </div>`;
    g.subs.forEach(s => {
      html += `<div class="gantt-row">
        <div class="gl sub">${s.label}</div>
        <div class="gr">
          <div class="bar" style="left:${pct(s.startM)};width:${pct(s.durM)};background:${g.color};opacity:.75"></div>
        </div>
      </div>`;
    });
  });

  grid.innerHTML = html;
}

render();
</script>
</body>
</html>
